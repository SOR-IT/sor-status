<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Program Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<!--
  ════════════════════════════════════════════════════════════════════
  PORTABLE STATUS DASHBOARD v2
  ════════════════════════════════════════════════════════════════════

  DROP INTO ANY REPO — 3 STEPS:

  1. Copy this file to docs/status.html in your repo

  2. Enable GitHub Pages:
     repo Settings → Pages → Deploy from branch → main → /docs

  3. Open the URL — defaults work out of the box for SOR-IT/sor-order-pipeline
     Customise via URL parameters for any other repo:

  URL PARAMETERS
  ──────────────
  repo        GitHub repo slug       default: SOR-IT/sor-order-pipeline
  file        Handoff file path      default: docs/HANDOFF.md
  org         Org display name       default: Studio OntheRock — Honolulu, HI
  title       Dashboard title        default: Program\nStatus  (\n = line break)
  p1name      Program 1 name
  p1status    Program 1 status       approved | pending | dev | complete | active | paused
  p1detail    Program 1 detail text  use \n for line breaks
  p2name      Program 2 name
  p2status    Program 2 status
  p2detail    Program 2 detail       overridden by **Current position:** in handoff if blank
  accent      Accent color hex       default: %23EB5A3C  (URL-encoded #)
  mstitle     Milestone section title

  HANDOFF FILE REQUIREMENTS
  ─────────────────────────
  Add this block anywhere in your HANDOFF.md to drive milestones:

    ## STATUS_MILESTONES
    | key | STATUS | Label text | sublabel text |
    | key | STATUS | Label text | sublabel text |

  STATUS values: DONE | ACTIVE | NEXT | WAIT

  Auto-parsed from handoff (no special markup needed):
    **Current position:** <text>          → program 2 detail
    **Next session starts with:** <text>  → next action box

  Update the STATUS_MILESTONES table during each handoff save.
  Everything else updates automatically.
  ════════════════════════════════════════════════════════════════════
-->
<style>
:root {
  --dark:#0A2C37;--navy:#324B5A;--steel:#465F73;
  --accent:#EB5A3C;--white:#F5F2ED;--muted:#9AADA8;
  --green:#2ECC8A;--amber:#F5A623;
  --mono:'DM Mono',monospace;--sans:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--white);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(70,95,115,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(70,95,115,.12) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:48px 24px 80px}
.header{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:56px;flex-wrap:wrap}
.logo-block{display:flex;flex-direction:column;gap:4px}
.logo-rule{width:40px;height:3px;background:var(--accent);margin-bottom:12px}
.org-name{font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
h1{font-size:clamp(26px,5vw,38px);font-weight:800;line-height:1.05;color:var(--white)}
h1 span{color:var(--accent)}
.fetch-meta{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;line-height:1.7;padding-top:4px}
.fetch-meta a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--steel)}
.fetch-meta a:hover{color:var(--white)}
.programs{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:40px}
@media(max-width:600px){.programs{grid-template-columns:1fr}.hw-grid{grid-template-columns:1fr}}
.prog-card{background:rgba(50,75,90,.35);border:1px solid rgba(70,95,115,.5);border-radius:2px;padding:28px 24px;position:relative;overflow:hidden;transition:border-color .2s}
.prog-card:hover{border-color:var(--steel)}
.prog-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.prog-card.approved::before,.prog-card.complete::before{background:var(--green)}
.prog-card.pending::before,.prog-card.paused::before{background:var(--amber)}
.prog-card.dev::before,.prog-card.active::before{background:var(--accent)}
.prog-label{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.prog-name{font-size:17px;font-weight:700;color:var(--white);margin-bottom:16px;line-height:1.2}
.status-pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:500;padding:4px 10px;border-radius:2px;margin-bottom:16px;letter-spacing:.04em}
.status-pill.approved,.status-pill.complete{background:rgba(46,204,138,.15);color:var(--green);border:1px solid rgba(46,204,138,.3)}
.status-pill.pending,.status-pill.paused{background:rgba(245,166,35,.15);color:var(--amber);border:1px solid rgba(245,166,35,.3)}
.status-pill.dev,.status-pill.active{background:rgba(235,90,60,.15);color:var(--accent);border:1px solid rgba(235,90,60,.3)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.approved .dot,.complete .dot{background:var(--green);box-shadow:0 0 6px var(--green)}
.pending .dot,.paused .dot{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.dev .dot,.active .dot{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.prog-phase{font-size:13px;color:var(--muted);line-height:1.5}
.prog-phase strong{color:var(--white);font-weight:600}
.section{margin-bottom:40px}
.section-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.section-title{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.section-line{flex:1;height:1px;background:rgba(70,95,115,.4)}
.milestone-list{display:flex;flex-direction:column;gap:2px}
.milestone{display:grid;grid-template-columns:20px 1fr auto;align-items:center;gap:12px;padding:10px 14px;background:rgba(50,75,90,.2);border-left:2px solid transparent;font-size:13px;transition:background .15s}
.milestone:hover{background:rgba(50,75,90,.4)}
.milestone.DONE{border-left-color:var(--green)}
.milestone.ACTIVE{border-left-color:var(--accent);background:rgba(235,90,60,.06)}
.milestone.NEXT{border-left-color:var(--amber)}
.milestone.WAIT{border-left-color:rgba(70,95,115,.5)}
.ms-icon{font-size:13px;text-align:center;line-height:1;color:var(--muted)}
.milestone.DONE .ms-icon{color:var(--green)}
.milestone.ACTIVE .ms-icon{color:var(--accent)}
.milestone.NEXT .ms-icon{color:var(--amber)}
.ms-label{color:var(--white);line-height:1.35}
.ms-label small{display:block;font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
.ms-tag{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:2px;white-space:nowrap}
.ms-tag.DONE{background:rgba(46,204,138,.12);color:var(--green)}
.ms-tag.ACTIVE{background:rgba(235,90,60,.15);color:var(--accent)}
.ms-tag.NEXT{background:rgba(245,166,35,.12);color:var(--amber)}
.ms-tag.WAIT{background:rgba(70,95,115,.2);color:var(--muted)}
.hw-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.hw-card{background:rgba(50,75,90,.2);border:1px solid rgba(70,95,115,.35);border-radius:2px;padding:16px}
.hw-name{font-size:12px;font-weight:700;color:var(--white);margin-bottom:4px}
.hw-role{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:12px;line-height:1.4}
.hw-status{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:2px;display:inline-block}
.hw-status.ok{background:rgba(46,204,138,.12);color:var(--green)}
.hw-status.warn{background:rgba(245,166,35,.12);color:var(--amber)}
.hw-status.neutral{background:rgba(70,95,115,.3);color:var(--white)}
.hw-status.bad{background:rgba(235,90,60,.12);color:var(--accent)}
.next-box{border:1px solid rgba(235,90,60,.35);background:rgba(235,90,60,.06);border-radius:2px;padding:20px 24px;display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:start}
.next-icon{font-size:20px;padding-top:2px}
.next-label{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.next-text{font-size:14px;color:var(--white);line-height:1.55}
.next-text code{font-family:var(--mono);font-size:12px;background:rgba(235,90,60,.15);color:var(--accent);padding:1px 5px;border-radius:2px}
.ci-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ci-badge{font-family:var(--mono);font-size:11px;display:flex;align-items:center;gap:6px;padding:3px 10px;border-radius:2px;background:rgba(46,204,138,.12);color:var(--green);border:1px solid rgba(46,204,138,.25)}
.loading{text-align:center;padding:80px 0;font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.08em}
.spinner{width:24px;height:24px;border:2px solid rgba(70,95,115,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{height:1px;background:rgba(70,95,115,.25);margin:40px 0}
.footer{font-family:var(--mono);font-size:10px;color:rgba(154,173,168,.5);text-align:center;letter-spacing:.06em;line-height:1.8}
.no-ms{font-family:var(--mono);font-size:11px;color:var(--muted);padding:16px 14px;background:rgba(50,75,90,.2);border-left:2px solid rgba(70,95,115,.4);line-height:1.6}
.err{color:var(--accent);font-family:var(--mono);font-size:13px;max-width:480px;margin:0 auto;line-height:1.6}
.err small{color:var(--muted);font-size:11px;display:block;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span id="loading-msg">FETCHING LIVE STATUS</span>
  </div>
  <div id="dashboard" style="display:none">
    <div class="header">
      <div class="logo-block">
        <div class="logo-rule"></div>
        <div class="org-name" id="hdr-org"></div>
        <h1 id="hdr-title"></h1>
      </div>
      <div class="fetch-meta" id="fetch-meta"></div>
    </div>
    <div class="programs" id="programs"></div>
    <div class="section">
      <div class="section-head">
        <div class="section-title" id="ms-title">Milestones</div>
        <div class="section-line"></div>
      </div>
      <div class="milestone-list" id="milestone-list"></div>
    </div>
    <div class="section" id="hw-section" style="display:none">
      <div class="section-head">
        <div class="section-title">Hardware Status</div>
        <div class="section-line"></div>
      </div>
      <div class="hw-grid" id="hw-grid"></div>
    </div>
    <div class="section">
      <div class="section-head">
        <div class="section-title">Immediate Next Action</div>
        <div class="section-line"></div>
      </div>
      <div class="next-box">
        <div class="next-icon">→</div>
        <div>
          <div class="next-label">Next session</div>
          <div class="next-text" id="next-text">Loading…</div>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-head">
        <div class="section-title">Repository</div>
        <div class="section-line"></div>
      </div>
      <div class="ci-row" id="ci-row"></div>
    </div>
    <div class="divider"></div>
    <div class="footer" id="footer"></div>
  </div>
</div>

<script>
const Q = new URLSearchParams(location.search);
const C = {
  repo:     Q.get('repo')     || 'SOR-IT/sor-status',
  file:     Q.get('file')     || 'docs/STATUS.md',
  org:      Q.get('org')      || 'Studio OntheRock — Honolulu, HI',
  title:    Q.get('title')    || 'Program\nStatus',
  p1name:   Q.get('p1name')   || 'Network Modernization',
  p1status: Q.get('p1status') || 'approved',
  p1detail: Q.get('p1detail') || 'OPNsense · DNS · Samba AD · Kanidm SSO · Caddy\nHardware on order.',
  p2name:   Q.get('p2name')   || 'AI Estimating Pipeline',
  p2status: Q.get('p2status') || 'pending',
  p2detail: Q.get('p2detail') || '',
  accent:   Q.get('accent')   || '',
  mstitle:  Q.get('mstitle')  || 'AI Pipeline — Milestones',
};

if(C.accent) document.documentElement.style.setProperty('--accent', C.accent);

const SL = {approved:'Approved — In Progress',pending:'Pending Approval',dev:'In Development',complete:'Complete',active:'Active',paused:'Paused'};
const MI = {DONE:'✓',ACTIVE:'▶',NEXT:'◆',WAIT:'○'};
const MT = {DONE:'Done',ACTIVE:'Active',NEXT:'Up next',WAIT:'Pending'};

function inline(s){
  return s.replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
}

function parseMilestones(md){
  const i = md.indexOf('## STATUS_MILESTONES');
  if(i===-1) return null;
  const block = md.slice(i);
  const rows = block.split('\n').filter(l=>
    l.startsWith('| ') &&
    !/^\| key\b/.test(l) &&
    !/^\| ---/.test(l) &&
    !/^\| MILESTONE/.test(l) &&
    !/<!-- Machine/.test(l)
  );
  return rows.map(r=>{
    const c = r.split('|').map(x=>x.trim()).filter(Boolean);
    if(c.length < 2) return null;
    const status = (c[1]||'WAIT').toUpperCase();
    const label  = c[2]||c[0];
    const sub    = c[3]||'';
    return {status,label,sub};
  }).filter(Boolean);
}

function parsePos(md){
  const m = md.match(/\*\*Current position:\*\*\s*(.+?)(?=\n\n|\*\*Next)/s);
  return m ? m[1].replace(/\n/g,' ').replace(/`/g,'').trim() : '';
}

function parseNext(md){
  const m = md.match(/\*\*Next session starts with:\*\*\s*(.+?)(?=\n\n---|\n\n##)/s);
  return m ? m[1].replace(/\n/g,' ').trim() : '';
}

function parseHW(md){
  const items=[];
  if(md.includes('Mac Studio')){
    let st='warn',lb='⚠ Backorder';
    if(/mac studio.*arriv|arrived.*mac studio/i.test(md)){st='ok';lb='✓ In service';}
    else if(/mac studio.*cancel|cancel.*mac studio/i.test(md)){st='bad';lb='✗ Cancelled';}
    items.push({name:'Mac Studio M3 Ultra',role:'Primary inference · Qwen3 72B · Open WebUI',st,lb});
  }
  if(md.includes('Strix Halo')){
    let st='ok',lb='✓ On order';
    if(/strix halo.*arriv|arrived.*strix/i.test(md)){lb='✓ In service';}
    items.push({name:'Strix Halo AI+ 395',role:'Stage B VLM · Gemma 4 26B MoE · 128 GB',st,lb});
  }
  if(md.includes('MacBook Pro')){
    items.push({name:'MacBook Pro M3 Pro',role:'Dev environment · Qwen3 8B',st:'neutral',lb:'✓ Dev env verified'});
  }
  return items;
}

function render(md,sha){
  const now=new Date();
  const ts=now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' '+now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZoneName:'short'});
  const repoUrl=`https://github.com/${C.repo}`;
  const fileUrl=`${repoUrl}/blob/main/${C.file}`;

  // Header
  document.getElementById('hdr-org').textContent = C.org;
  const tp = C.title.split('\n');
  document.getElementById('hdr-title').innerHTML =
    tp.length>1 ? `${tp[0]}<br><span>${tp[1]}</span>` : `<span>${tp[0]}</span>`;

  document.getElementById('fetch-meta').innerHTML =
    `Live from repo<br><a href="${fileUrl}" target="_blank">${C.file}</a><br>`+
    `commit <span style="font-family:var(--mono)">${sha}</span><br>fetched ${ts}`;

  // Programs
  const pos = parsePos(md);
  const p2d = C.p2detail || (pos ? pos.slice(0,220)+(pos.length>220?'…':'') : '');

  const card = (n,name,st,det) =>
    `<div class="prog-card ${st}">
       <div class="prog-label">Program 0${n}</div>
       <div class="prog-name">${name}</div>
       <div class="status-pill ${st}"><span class="dot"></span>${SL[st]||st}</div>
       <div class="prog-phase">${det.replace(/\n/g,'<br>')}</div>
     </div>`;

  document.getElementById('programs').innerHTML =
    card(1,C.p1name,C.p1status,C.p1detail)+card(2,C.p2name,C.p2status,p2d);

  // Milestones
  document.getElementById('ms-title').textContent = C.mstitle;
  const ms = parseMilestones(md);
  const ml = document.getElementById('milestone-list');
  if(!ms||ms.length===0){
    ml.innerHTML=`<div class="no-ms">No STATUS_MILESTONES block found in <code>${C.file}</code>.<br>
      Add one to drive this section automatically — see the comment at the top of status.html.</div>`;
  } else {
    ml.innerHTML = ms.map(m=>
      `<div class="milestone ${m.status}">
         <div class="ms-icon">${MI[m.status]||'○'}</div>
         <div class="ms-label">${m.label}${m.sub?`<small>${m.sub}</small>`:''}</div>
         <div class="ms-tag ${m.status}">${MT[m.status]||m.status}</div>
       </div>`
    ).join('');
  }

  // Hardware
  const hw = parseHW(md);
  if(hw.length>0){
    document.getElementById('hw-section').style.display='';
    document.getElementById('hw-grid').innerHTML = hw.map(h=>
      `<div class="hw-card">
         <div class="hw-name">${h.name}</div>
         <div class="hw-role">${h.role}</div>
         <div class="hw-status ${h.st}">${h.lb}</div>
       </div>`
    ).join('');
  }

  // Next action
  const nxt = parseNext(md);
  document.getElementById('next-text').innerHTML =
    nxt ? inline(nxt) : 'See handoff document for next steps.';

  // CI row
  document.getElementById('ci-row').innerHTML =
    `<div class="ci-badge"><span>●</span> CI passing</div>`+
    `<div class="ci-badge"><span>●</span> main — clean</div>`+
    `<div style="font-family:var(--mono);font-size:11px;color:var(--muted)">
       <a href="${repoUrl}" target="_blank" style="color:var(--muted);text-decoration:none;border-bottom:1px solid var(--steel)">${C.repo} ↗</a>
     </div>`+
    `<a href="${repoUrl}/actions" target="_blank" style="font-family:var(--mono);font-size:11px;color:var(--muted);text-decoration:none;border-bottom:1px solid var(--steel)">Actions ↗</a>`;

  // Footer
  document.getElementById('footer').innerHTML =
    `STATUS SOURCED FROM ${C.file.toUpperCase()} · ${C.repo.toUpperCase()} · COMMIT ${sha.toUpperCase()}<br>`+
    `FETCHED ${ts.toUpperCase()} · UPDATES ON EVERY HANDOFF SAVE`;

  document.getElementById('loading').style.display='none';
  document.getElementById('dashboard').style.display='block';
}

async function load(){
  document.getElementById('loading-msg').textContent =
    `FETCHING ${C.repo.toUpperCase()} / ${C.file.toUpperCase()}`;
  const api=`https://api.github.com/repos/${C.repo}/contents/${C.file}`;
  try {
    const res = await fetch(api,{headers:{Accept:'application/vnd.github.v3+json'}});
    if(!res.ok) throw new Error(`GitHub API ${res.status} — verify repo is public and file path is correct`);
    const json = await res.json();
    const md   = decodeURIComponent(escape(atob(json.content.replace(/\n/g,''))));
    render(md, json.sha.slice(0,7));
  } catch(e){
    document.getElementById('loading').innerHTML =
      `<div class="err">COULD NOT FETCH LIVE DATA<small>${e.message}<br><br>`+
      `Verify: repo is public · file path is correct · GitHub Pages enabled</small></div>`;
  }
}

load();
</script>
</body>
</html>
