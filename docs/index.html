<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio OntheRock — Program Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<!--
  COMBINED STATUS DASHBOARD
  Reads docs/STATUS.md from SOR-IT/sor-status (this repo).
  STATUS.md contains both program blocks — no IP, no implementation detail.

  STATUS.md FORMAT:
  ─────────────────
  ## NETWORK_STATUS
  | status | APPROVED | (or PENDING | DEV | COMPLETE | PAUSED)
  | detail | text here |

  ## NETWORK_MILESTONES
  | key | DONE | Label | sublabel |
  | key | ACTIVE | Label | sublabel |
  | key | WAIT | Label | sublabel |

  ## AI_STATUS
  | status | PENDING |
  | detail | text here |

  ## AI_MILESTONES
  | key | DONE | Label | sublabel |
  ...

  ## NEXT_ACTION
  Free text — the immediate next step across both programs.
-->
<style>
:root {
  --dark:#0A2C37;--navy:#324B5A;--steel:#465F73;
  --lehua:#EB5A3C;--white:#F5F2ED;--muted:#9AADA8;
  --green:#2ECC8A;--amber:#F5A623;--red:#E74C3C;
  --mono:'DM Mono',monospace;--sans:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--white);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(70,95,115,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(70,95,115,.12) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:48px 24px 80px}

/* HEADER */
.header{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:52px;flex-wrap:wrap}
.logo-block{display:flex;flex-direction:column;gap:4px}
.logo-rule{width:40px;height:3px;background:var(--lehua);margin-bottom:12px}
.org-name{font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
h1{font-size:clamp(24px,5vw,36px);font-weight:800;line-height:1.05;color:var(--white)}
h1 span{color:var(--lehua)}
.fetch-meta{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;line-height:1.7;padding-top:4px}
.fetch-meta a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--steel)}
.fetch-meta a:hover{color:var(--white)}

/* PROGRAM COLUMNS */
.programs{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:40px}
@media(max-width:640px){.programs{grid-template-columns:1fr}}

.program{}

.prog-header{padding:20px 20px 16px;border-radius:2px 2px 0 0;position:relative;overflow:hidden}
.prog-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:rgba(255,255,255,.08)}
.prog-header.approved{background:rgba(46,204,138,.12);border:1px solid rgba(46,204,138,.25);border-bottom:none}
.prog-header.pending{background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);border-bottom:none}
.prog-header.dev{background:rgba(235,90,60,.1);border:1px solid rgba(235,90,60,.25);border-bottom:none}
.prog-header.complete{background:rgba(46,204,138,.12);border:1px solid rgba(46,204,138,.25);border-bottom:none}

.prog-num{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.prog-name{font-size:16px;font-weight:700;color:var(--white);margin-bottom:12px;line-height:1.2}

.status-pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;font-weight:500;padding:3px 9px;border-radius:2px;margin-bottom:10px;letter-spacing:.04em}
.status-pill.approved,.status-pill.complete{background:rgba(46,204,138,.15);color:var(--green);border:1px solid rgba(46,204,138,.3)}
.status-pill.pending,.status-pill.paused{background:rgba(245,166,35,.15);color:var(--amber);border:1px solid rgba(245,166,35,.3)}
.status-pill.dev,.status-pill.active{background:rgba(235,90,60,.15);color:var(--lehua);border:1px solid rgba(235,90,60,.3)}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.approved .dot,.complete .dot{background:var(--green);box-shadow:0 0 5px var(--green)}
.pending .dot,.paused .dot{background:var(--amber);box-shadow:0 0 5px var(--amber)}
.dev .dot,.active .dot{background:var(--lehua);box-shadow:0 0 5px var(--lehua)}
.prog-detail{font-size:12px;color:var(--muted);line-height:1.5}
.prog-detail strong{color:var(--white);font-weight:600}

/* MILESTONE LIST inside program column */
.prog-milestones{border:1px solid rgba(70,95,115,.35);border-top:none;border-radius:0 0 2px 2px;overflow:hidden}
.ms{display:grid;grid-template-columns:18px 1fr auto;align-items:center;gap:10px;padding:9px 14px;background:rgba(50,75,90,.15);border-bottom:1px solid rgba(70,95,115,.2);font-size:12px;transition:background .15s}
.ms:last-child{border-bottom:none}
.ms:hover{background:rgba(50,75,90,.35)}
.ms.DONE{border-left:2px solid var(--green)}
.ms.ACTIVE{border-left:2px solid var(--lehua);background:rgba(235,90,60,.06)}
.ms.NEXT{border-left:2px solid var(--amber)}
.ms.WAIT{border-left:2px solid rgba(70,95,115,.4)}
.ms-ic{font-size:11px;text-align:center;color:var(--muted)}
.ms.DONE .ms-ic{color:var(--green)}
.ms.ACTIVE .ms-ic{color:var(--lehua)}
.ms.NEXT .ms-ic{color:var(--amber)}
.ms-lb{color:var(--white);line-height:1.3;font-size:12px}
.ms-lb small{display:block;font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:1px;line-height:1.4}
.ms-tg{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:2px;white-space:nowrap}
.ms-tg.DONE{background:rgba(46,204,138,.12);color:var(--green)}
.ms-tg.ACTIVE{background:rgba(235,90,60,.15);color:var(--lehua)}
.ms-tg.NEXT{background:rgba(245,166,35,.12);color:var(--amber)}
.ms-tg.WAIT{background:rgba(70,95,115,.2);color:var(--muted)}

/* SECTION */
.section{margin-bottom:36px}
.section-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.section-title{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.section-line{flex:1;height:1px;background:rgba(70,95,115,.35)}

/* NEXT ACTION */
.next-box{border:1px solid rgba(235,90,60,.3);background:rgba(235,90,60,.05);border-radius:2px;padding:18px 22px;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:start}
.next-icon{font-size:18px;padding-top:1px}
.next-label{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--lehua);margin-bottom:5px}
.next-text{font-size:13px;color:var(--white);line-height:1.6}
.next-text code{font-family:var(--mono);font-size:11px;background:rgba(235,90,60,.15);color:var(--lehua);padding:1px 5px;border-radius:2px}

.hw-card{background:rgba(50,75,90,.2);border:1px solid rgba(70,95,115,.35);border-radius:2px;padding:14px 16px}
.hw-name{font-size:12px;font-weight:700;color:var(--white);margin-bottom:3px}
.hw-role{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:10px;line-height:1.4}
.hw-status{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:2px;display:inline-block}
.hw-status.ok{background:rgba(46,204,138,.12);color:var(--green)}
.hw-status.warn{background:rgba(245,166,35,.12);color:var(--amber)}
.hw-status.neutral{background:rgba(70,95,115,.3);color:var(--white)}
.hw-status.bad{background:rgba(235,90,60,.12);color:var(--lehua)}
/* LOADING */
.loading{text-align:center;padding:80px 0;font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.08em}
.spinner{width:24px;height:24px;border:2px solid rgba(70,95,115,.3);border-top-color:var(--lehua);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{height:1px;background:rgba(70,95,115,.2);margin:36px 0}
.footer{font-family:var(--mono);font-size:10px;color:rgba(154,173,168,.45);text-align:center;letter-spacing:.06em;line-height:1.8}
.err{color:var(--lehua);font-family:var(--mono);font-size:13px;max-width:480px;margin:0 auto;line-height:1.6;text-align:center}
.err small{color:var(--muted);font-size:11px;display:block;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    FETCHING LIVE STATUS
  </div>

  <div id="dashboard" style="display:none">
    <div class="header">
      <div class="logo-block">
        <div class="logo-rule"></div>
        <div class="org-name">Studio OntheRock — Honolulu, HI</div>
        <h1>Program<br><span>Status</span></h1>
      </div>
      <div class="fetch-meta" id="fetch-meta"></div>
    </div>

    <!-- DUAL PROGRAM COLUMNS -->
    <div class="section">
      <div class="section-head">
        <div class="section-title">Active Programs</div>
        <div class="section-line"></div>
      </div>
      <div class="programs">
        <!-- Network -->
        <div class="program">
          <div class="prog-header" id="net-header">
            <div class="prog-num">Program 01</div>
            <div class="prog-name">Network Modernization</div>
            <div class="status-pill" id="net-pill"><span class="dot"></span><span id="net-pill-text"></span></div>
            <div class="prog-detail" id="net-detail"></div>
          </div>
          <div class="prog-milestones" id="net-milestones"></div>
        </div>
        <!-- AI Pipeline -->
        <div class="program">
          <div class="prog-header" id="ai-header">
            <div class="prog-num">Program 02</div>
            <div class="prog-name">Estimating Pipeline</div>
            <div class="status-pill" id="ai-pill"><span class="dot"></span><span id="ai-pill-text"></span></div>
            <div class="prog-detail" id="ai-detail"></div>
          </div>
          <div class="prog-milestones" id="ai-milestones"></div>
        </div>
      </div>
    </div>

    <!-- HARDWARE -->
    <div class="section" id="hw-section" style="display:none">
      <div class="section-head">
        <div class="section-title">Hardware Status</div>
        <div class="section-line"></div>
      </div>
      <div id="hw-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px"></div>
    </div>

    <!-- NEXT ACTION -->
    <div class="section">
      <div class="section-head">
        <div class="section-title">Immediate Next Action</div>
        <div class="section-line"></div>
      </div>
      <div class="next-box">
        <div class="next-icon">→</div>
        <div>
          <div class="next-label">Next session</div>
          <div class="next-text" id="next-text">Loading…</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>
    <div class="footer" id="footer"></div>
  </div>
</div>

<script>
const REPO = 'SOR-IT/sor-status';
const FILE = 'docs/STATUS.md';

const SL = {
  APPROVED:'Approved — In Progress', PENDING:'Pending Approval',
  DEV:'In Development', COMPLETE:'Complete',
  ACTIVE:'Active', PAUSED:'Paused'
};
const MI = {DONE:'✓', ACTIVE:'▶', NEXT:'◆', WAIT:'○'};
const MT = {DONE:'Done', ACTIVE:'Active', NEXT:'Up next', WAIT:'Pending'};

function inline(s){
  return s
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
}

function parseSection(md, heading){
  const i = md.indexOf(`## ${heading}`);
  if(i===-1) return [];
  const rest = md.slice(i + heading.length + 3);
  const end  = rest.search(/^## /m);
  const block = end===-1 ? rest : rest.slice(0, end);
  return block.split('\n')
    .filter(l => l.startsWith('| ') && !/^\| ---/.test(l))
    .map(l => l.split('|').map(c=>c.trim()).filter(Boolean));
}

function parseStatus(md, heading){
  const rows = parseSection(md, heading);
  const obj  = {};
  rows.forEach(cols => { if(cols.length>=2) obj[cols[0].toLowerCase()] = cols[1]; });
  return obj;
}

function parseMilestones(md, heading){
  const rows = parseSection(md, heading);
  return rows.map(cols => ({
    status: (cols[1]||'WAIT').toUpperCase(),
    label:  cols[2]||cols[0],
    sub:    cols[3]||''
  }));
}

function parseHardware(md){
  const rows = parseSection(md, 'HARDWARE');
  return rows.map(cols => ({
    name:   cols[0]||'',
    state:  (cols[1]||'READY').toUpperCase(),
    label:  cols[2]||'',
    role:   cols[3]||''
  }));
}

function renderHardware(items){
  const el = document.getElementById('hw-grid');
  const sec = document.getElementById('hw-section');
  if(!items||items.length===0){ sec.style.display='none'; return; }
  sec.style.display='';
  const stClass = {OK:'ok', WARN:'warn', READY:'neutral', BAD:'bad'};
  el.innerHTML = items.map(h=>`
    <div class="hw-card">
      <div class="hw-name">${h.name}</div>
      <div class="hw-role">${h.role}</div>
      <div class="hw-status ${stClass[h.state]||'neutral'}">${h.label}</div>
    </div>`).join('');
}


  const i = md.indexOf('## NEXT_ACTION');
  if(i===-1) return '';
  const rest = md.slice(i+14);
  const end  = rest.search(/^## /m);
  return (end===-1 ? rest : rest.slice(0,end)).replace(/\n/g,' ').trim();
}

function renderProgram(headerId, pillId, pillTextId, detailId, msId, statusObj, milestones){
  const st = (statusObj.status||'PENDING').toLowerCase();
  const detail = statusObj.detail||'';

  document.getElementById(headerId).className = `prog-header ${st}`;
  const pill = document.getElementById(pillId);
  pill.className = `status-pill ${st}`;
  document.getElementById(pillTextId).textContent = SL[st.toUpperCase()]||st;
  document.getElementById(detailId).innerHTML = detail.replace(/\n/g,'<br>');

  const msEl = document.getElementById(msId);
  if(!milestones||milestones.length===0){
    msEl.innerHTML='';
    return;
  }
  msEl.innerHTML = milestones.map(m=>`
    <div class="ms ${m.status}">
      <div class="ms-ic">${MI[m.status]||'○'}</div>
      <div class="ms-lb">${m.label}${m.sub?`<small>${m.sub}</small>`:''}</div>
      <div class="ms-tg ${m.status}">${MT[m.status]||m.status}</div>
    </div>`).join('');
}

function render(md, sha){
  const now = new Date();
  const ts  = now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
            + ' ' + now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZoneName:'short'});

  const repoUrl = `https://github.com/${REPO}`;
  const fileUrl = `${repoUrl}/blob/main/${FILE}`;

  document.getElementById('fetch-meta').innerHTML =
    `Live · <a href="${fileUrl}" target="_blank">${FILE}</a><br>`+
    `commit <span style="font-family:var(--mono)">${sha}</span><br>`+
    `fetched ${ts}`;

  // Network program
  const netStatus = parseStatus(md, 'NETWORK_STATUS');
  const netMs     = parseMilestones(md, 'NETWORK_MILESTONES');
  renderProgram('net-header','net-pill','net-pill-text','net-detail','net-milestones', netStatus, netMs);

  // AI program
  const aiStatus = parseStatus(md, 'AI_STATUS');
  const aiMs     = parseMilestones(md, 'AI_MILESTONES');
  renderProgram('ai-header','ai-pill','ai-pill-text','ai-detail','ai-milestones', aiStatus, aiMs);

  // Hardware
  const hw = parseHardware(md);
  renderHardware(hw);

  // Next action
  const nxt = parseNextAction(md);
  document.getElementById('next-text').innerHTML = nxt ? inline(nxt) : 'See program leads for next steps.';

  // Footer
  document.getElementById('footer').innerHTML =
    `STATUS SOURCED FROM ${FILE.toUpperCase()} · ${REPO.toUpperCase()} · COMMIT ${sha.toUpperCase()}<br>`+
    `FETCHED ${ts.toUpperCase()} · UPDATES ON EVERY HANDOFF SAVE`;

  document.getElementById('loading').style.display  = 'none';
  document.getElementById('dashboard').style.display = 'block';
}

async function load(){
  const api = `https://api.github.com/repos/${REPO}/contents/${FILE}`;
  try{
    const res  = await fetch(api,{headers:{Accept:'application/vnd.github.v3+json'}});
    if(!res.ok) throw new Error(`GitHub API ${res.status}`);
    const json = await res.json();
    const md   = decodeURIComponent(escape(atob(json.content.replace(/\n/g,''))));
    render(md, json.sha.slice(0,7));
  } catch(e){
    document.getElementById('loading').innerHTML =
      `<div class="err">COULD NOT FETCH LIVE DATA<small>${e.message}<br><br>`+
      `Verify SOR-IT/sor-status is public and GitHub Pages is enabled.</small></div>`;
  }
}

load();
</script>
</body>
</html>
